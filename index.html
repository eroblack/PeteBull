<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Ball Betting</title>
    <style>
        :root { --accent: #ffd700; --bg: #050a14; }
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { 
            background: var(--bg); color: white; font-family: sans-serif; 
            margin: 0; display: flex; flex-direction: column; align-items: center; 
            height: 100vh; overflow: hidden;
        }

        /* --- UI TOP --- */
        #top-bar { width: 100%; padding: 15px; display: flex; justify-content: space-around; background: #111; border-bottom: 2px solid #333; }
        .stat-box { text-align: center; }
        .label { font-size: 10px; color: var(--accent); text-transform: uppercase; }
        .val { font-size: 18px; font-weight: bold; }

        /* --- TIMER BAR --- */
        #timer-cont { width: 90%; height: 8px; background: #222; margin: 15px 0; border-radius: 10px; overflow: hidden; }
        #timer-bar { width: 100%; height: 100%; background: linear-gradient(to right, #00ff00, #ff0000); transition: 0.1s; }

        /* --- GAME BOARD --- */
        #game-board { display: flex; flex-wrap: wrap; justify-content: center; gap: 12px; padding: 10px; }
        .tube {
            width: 50px; height: 160px; border: 3px solid rgba(255,255,255,0.2);
            border-top: none; border-radius: 0 0 25px 25px;
            display: flex; flex-direction: column-reverse; align-items: center;
            padding-bottom: 8px; cursor: pointer; transition: 0.2s;
        }
        .tube.selected { border-color: var(--accent); transform: scale(1.05); box-shadow: 0 0 15px var(--accent); }
        .ball { width: 38px; height: 38px; border-radius: 50%; margin-bottom: 2px; box-shadow: inset -4px -4px 8px rgba(0,0,0,0.5); }

        /* --- MODAL BETTING --- */
        #modal-bet { position: fixed; inset: 0; background: rgba(0,0,0,0.95); display: flex; flex-direction: column; align-items: center; justify-content: center; z-index: 100; }
        .bet-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; }
        .bet-btn { 
            background: #1a1a1a; border: 2px solid var(--accent); color: white; 
            padding: 20px; border-radius: 15px; font-size: 20px; font-weight: bold; cursor: pointer;
        }

        /* COLORS */
        .c1 { background: radial-gradient(circle at 30% 30%, #ff4d4d, #800); }
        .c2 { background: radial-gradient(circle at 30% 30%, #4d94ff, #004); }
        .c3 { background: radial-gradient(circle at 30% 30%, #4dff4d, #040); }
        .c4 { background: radial-gradient(circle at 30% 30%, #ffff4d, #880); }
        .c5 { background: radial-gradient(circle at 30% 30%, #ff4dff, #404); }
    </style>
</head>
<body>

    <div id="top-bar">
        <div class="stat-box"><div class="label">Miza</div><div id="display-bet" class="val">0 GD</div></div>
        <div class="stat-box"><div class="label">Potansyèl (5x)</div><div id="display-win" class="val" style="color:#0f0">0 GD</div></div>
    </div>

    <div id="timer-cont"><div id="timer-bar"></div></div>

    <div id="game-board"></div>

    <div id="modal-bet">
        <h2 style="color:var(--accent)">CHWAZI MIZA W</h2>
        <p>Genyen 5 fwa miza w si w fini a tan!</p>
        <div class="bet-grid">
            <button class="bet-btn" onclick="startBet(5)">5 GD</button>
            <button class="bet-btn" onclick="startBet(10)">10 GD</button>
            <button class="bet-btn" onclick="startBet(25)">25 GD</button>
            <button class="bet-btn" onclick="startBet(100)">100 GD</button>
        </div>
    </div>

    <script>
        let currentBet = 0;
        let timeLeft = 100;
        let gameActive = false;
        let tubesData = [];
        let selectedIndex = null;
        let timerInterval;

        function sendToSketchware(bwat, val) {
            if (window.Android && window.Android.voyeKòb) {
                window.Android.voyeKòb(bwat, val.toString());
            }
        }

        function startBet(amount) {
            currentBet = amount;
            document.getElementById('display-bet').innerText = amount + " GD";
            document.getElementById('display-win').innerText = (amount * 5) + " GD";
            document.getElementById('modal-bet').style.display = 'none';
            
            // Voye kòb la nan Sketchware (Miza)
            sendToSketchware("peye", amount);
            
            setupLevel(amount);
            startGame();
        }

        function setupLevel(bet) {
            // Plis kòb la gwo, se plis gen koulè ak mwens tib vid
            if (bet <= 10) {
                tubesData = [['c1','c2','c1','c2'], ['c2','c1','c2','c1'], [], []];
                timeLeft = 45; // 45 segonn
            } else if (bet <= 25) {
                tubesData = [['c1','c2','c3','c1'], ['c3','c1','c2','c3'], ['c2','c3','c1','c2'], [], []];
                timeLeft = 60;
            } else {
                // Nivo 100 GD (Trè difisil)
                tubesData = [
                    ['c1','c5','c2','c3'], ['c4','c1','c5','c2'], 
                    ['c3','c4','c1','c5'], ['c2','c3','c4','c1'],
                    ['c5','c2','c3','c4'], [], []
                ];
                timeLeft = 90;
            }
            render();
        }

        function startGame() {
            gameActive = true;
            const initialTime = timeLeft;
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                let percent = (timeLeft / initialTime) * 100;
                document.getElementById('timer-bar').style.width = percent + "%";

                if (timeLeft <= 0) {
                    gameOver("TAN FINI! OU PÈDI.");
                }
            }, 100);
        }

        function render() {
            const board = document.getElementById('game-board');
            board.innerHTML = '';
            tubesData.forEach((tube, index) => {
                const div = document.createElement('div');
                div.className = `tube ${selectedIndex === index ? 'selected' : ''}`;
                div.onclick = () => handleTubeClick(index);
                tube.forEach(c => {
                    const b = document.createElement('div');
                    b.className = `ball ${c}`;
                    div.appendChild(b);
                });
                board.appendChild(div);
            });
        }

        function handleTubeClick(index) {
            if (!gameActive) return;
            if (selectedIndex === null) {
                if (tubesData[index].length > 0) selectedIndex = index;
            } else {
                if (selectedIndex !== index) moveBall(selectedIndex, index);
                selectedIndex = null;
            }
            render();
            checkWin();
        }

        function moveBall(from, to) {
            const f = tubesData[from];
            const t = tubesData[to];
            const ball = f[f.length - 1];
            if (t.length < 4 && (t.length === 0 || t[t.length-1] === ball)) {
                t.push(f.pop());
            }
        }

        function checkWin() {
            const win = tubesData.every(tube => 
                tube.length === 0 || (tube.length === 4 && tube.every(b => b === tube[0]))
            );
            if (win) {
                gameActive = false;
                clearInterval(timerInterval);
                let winAmount = currentBet * 5;
                sendToSketchware("genyen", winAmount);
                alert("BRAVO! OU GENYEN " + winAmount + " GD!");
                location.reload();
            }
        }

        function gameOver(msg) {
            gameActive = false;
            clearInterval(timerInterval);
            alert(msg);
            location.reload();
        }
    </script>
</body>
</html>
