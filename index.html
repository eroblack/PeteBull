<!DOCTYPE html>
<html lang="ht">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Eroblack Ball Sort Puzzle</title>
    <style>
        :root {
            --bg-color: #050a14;
            --tube-border: rgba(255, 255, 255, 0.2);
            --selected-color: #00f2ff;
        }

        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }

        body {
            background-color: var(--bg-color);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
        }

        .header { margin-bottom: 20px; text-align: center; }
        .level-tag { background: #1a1a1a; padding: 5px 20px; border-radius: 20px; border: 1px solid #333; font-weight: bold; }

        #game-board {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 20px;
            padding: 20px;
            max-width: 400px;
        }

        .tube {
            width: 55px;
            height: 170px;
            border: 3px solid var(--tube-border);
            border-top: none;
            border-radius: 0 0 30px 30px;
            display: flex;
            flex-direction: column-reverse;
            align-items: center;
            padding-bottom: 10px;
            cursor: pointer;
            position: relative;
            background: rgba(255, 255, 255, 0.03);
            transition: 0.3s;
        }

        .tube.selected {
            border-color: var(--selected-color);
            box-shadow: 0 0 20px rgba(0, 242, 255, 0.4);
            transform: translateY(-10px);
        }

        .ball {
            width: 42px;
            height: 42px;
            border-radius: 50%;
            margin-bottom: 3px;
            box-shadow: inset -6px -6px 12px rgba(0,0,0,0.4), inset 6px 6px 12px rgba(255,255,255,0.2);
        }

        /* Ball Colors (3D Gradient) */
        .red { background: radial-gradient(circle at 35% 35%, #ff5f5f, #8b0000); }
        .blue { background: radial-gradient(circle at 35% 35%, #5facff, #003366); }
        .purple { background: radial-gradient(circle at 35% 35%, #e05fff, #4b0082); }
        .green { background: radial-gradient(circle at 35% 35%, #63ff5f, #004d00); }
        .yellow { background: radial-gradient(circle at 35% 35%, #fffb5f, #8b8000); }

        .controls { margin-top: 30px; display: flex; gap: 15px; }
        .btn {
            background: #1a1a1a; border: 1px solid #444; color: white;
            padding: 10px 20px; border-radius: 10px; cursor: pointer; font-weight: bold;
        }
        
        #win-modal {
            position: fixed; inset: 0; background: rgba(0,0,0,0.9);
            display: none; flex-direction: column; align-items: center; justify-content: center; z-index: 100;
        }
    </style>
</head>
<body>

    <div class="header">
        <div class="level-tag">LEVEL 393</div>
    </div>

    <div id="game-board"></div>

    <div class="controls">
        <button class="btn" onclick="resetGame()">RESET</button>
        <button class="btn" onclick="undoMove()">UNDO</button>
    </div>

    <div id="win-modal">
        <h1 style="color: #00f2ff;">COMPLETED!</h1>
        <button class="btn" style="background: #00f2ff; color: #000;" onclick="location.reload()">NEXT LEVEL</button>
    </div>

    <script>
        const gameBoard = document.getElementById('game-board');
        const winModal = document.getElementById('win-modal');
        
        // Konfigirasyon nivo a
        let tubesData = [
            ['red', 'blue', 'purple', 'green'],
            ['green', 'red', 'blue', 'purple'],
            ['purple', 'green', 'red', 'blue'],
            ['blue', 'purple', 'green', 'red'],
            ['yellow', 'yellow', 'yellow', 'yellow'],
            [], [] // Tib vid
        ];

        let selectedIndex = null;
        let history = [];

        function initGame() {
            gameBoard.innerHTML = '';
            tubesData.forEach((tube, index) => {
                const tubeDiv = document.createElement('div');
                tubeDiv.className = `tube ${selectedIndex === index ? 'selected' : ''}`;
                tubeDiv.onclick = () => handleTubeClick(index);

                tube.forEach(color => {
                    const ball = document.createElement('div');
                    ball.className = `ball ${color}`;
                    tubeDiv.appendChild(ball);
                });
                gameBoard.appendChild(tubeDiv);
            });
            checkWin();
        }

        function handleTubeClick(index) {
            if (selectedIndex === null) {
                if (tubesData[index].length > 0) {
                    selectedIndex = index;
                }
            } else {
                if (selectedIndex === index) {
                    selectedIndex = null;
                } else {
                    moveBall(selectedIndex, index);
                    selectedIndex = null;
                }
            }
            initGame();
        }

        function moveBall(from, to) {
            const fromTube = tubesData[from];
            const toTube = tubesData[to];
            const ball = fromTube[fromTube.length - 1];

            if (toTube.length < 4 && (toTube.length === 0 || toTube[toTube.length - 1] === ball)) {
                history.push(JSON.parse(JSON.stringify(tubesData))); // Save for Undo
                toTube.push(fromTube.pop());
            }
        }

        function undoMove() {
            if (history.length > 0) {
                tubesData = history.pop();
                initGame();
            }
        }

        function resetGame() {
            location.reload();
        }

        function checkWin() {
            const isWon = tubesData.every(tube => {
                return tube.length === 0 || (tube.length === 4 && tube.every(b => b === tube[0]));
            });
            
            if (isWon && tubesData.some(t => t.length > 0)) {
                setTimeout(() => winModal.style.display = 'flex', 500);
            }
        }

        initGame();
    </script>
</body>
</html>
